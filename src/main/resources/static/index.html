<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart - Fresh Groceries Delivered</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; background: #f8f9fa; }
        header { background: linear-gradient(135deg, #2d8a4e, #1a6b3a); color: white; padding: 2.5rem 1rem; text-align: center; position: relative; }
        header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        header p { font-size: 1.15rem; opacity: 0.9; font-weight: 300; }
        .cart-icon { position: absolute; top: 1rem; right: 1rem; background: #ff6b6b; color: white; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .cart-count { position: absolute; top: -8px; right: -8px; background: #ff6b6b; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .product-card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
        .product-name { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .product-price { font-size: 1.4rem; color: #2d8a4e; font-weight: 700; margin-bottom: 1rem; }
        .add-to-cart { background: #2d8a4e; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; transition: background 0.2s; }
        .add-to-cart:hover { background: #1a6b3a; }
        .loading { text-align: center; padding: 3rem; font-size: 1.1rem; color: #666; }
        .empty { text-align: center; padding: 3rem; color: #999; }
        footer { text-align: center; padding: 2rem 1rem; color: #888; font-size: 0.9rem; border-top: 1px solid #e9ecef; margin-top: 2rem; }
        
        /* Cart Sidebar Styles */
        .cart-sidebar { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.1); z-index: 1000; transition: right 0.3s ease; padding: 1.5rem; overflow-y: auto; }
        .cart-sidebar.open { right: 0; }
        .close-cart { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .cart-items { margin-bottom: 1.5rem; }
        .cart-item { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid #eee; }
        .cart-total { border-top: 2px solid #eee; padding-top: 1rem; margin-top: 1rem; font-size: 1.2rem; font-weight: bold; }
        .checkout-btn { background: #2d8a4e; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 1rem; }
        .checkout-btn:hover { background: #1a6b3a; }
        
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .product-grid { grid-template-columns: 1fr; }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>
    <header>
        <h1>FreshMart</h1>
        <p>Fresh groceries delivered to your door</p>
        <div class="cart-icon" onclick="toggleCart()">
            🛒
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </header>
    
    <div class="container">
        <div id="products" class="product-grid">
            <div class="loading">Loading products...</div>
        </div>
    </div>
    
    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <button class="close-cart" onclick="toggleCart()">&times;</button>
        <div class="cart-header">
            <h2>Your Cart</h2>
        </div>
        <div id="cartItems" class="cart-items">
            <!-- Cart items will be populated here -->
        </div>
        <div id="cartTotal" class="cart-total">
            Total: $0.00
        </div>
        <button class="checkout-btn">Checkout</button>
    </div>
    
    <footer>Powered by jclaw</footer>
    
    <script>
        let cartId = localStorage.getItem('cartId') || null;
        
        function toggleCart() {
            const sidebar = document.getElementById('cartSidebar');
            sidebar.classList.toggle('open');
        }
        
        function updateCartCount(count) {
            document.getElementById('cartCount').textContent = count;
        }
        
        function updateCartDisplay() {
            if (!cartId) return;
            
            fetch(`/api/cart/${cartId}`)
                .then(response => response.json())
                .then(items => {
                    const cartItemsContainer = document.getElementById('cartItems');
                    const cartTotalElement = document.getElementById('cartTotal');
                    
                    if (!items || items.length === 0) {
                        cartItemsContainer.innerHTML = '<p>Your cart is empty</p>';
                        cartTotalElement.textContent = 'Total: $0.00';
                        updateCartCount(0);
                        return;
                    }
                    
                    // Calculate total
                    let total = 0;
                    cartItemsContainer.innerHTML = items.map(item => {
                        const itemTotal = item.price * item.quantity;
                        total += itemTotal;
                        return `
                            <div class="cart-item">
                                <div>
                                    <div>${item.productName}</div>
                                    <div>Qty: ${item.quantity}</div>
                                </div>
                                <div>$${itemTotal.toFixed(2)}</div>
                            </div>
                        `;
                    }).join('');
                    
                    cartTotalElement.textContent = `Total: $${total.toFixed(2)}`;
                    updateCartCount(items.reduce((sum, item) => sum + item.quantity, 0));
                })
                .catch(err => {
                    console.error('Error loading cart:', err);
                });
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/products')
                .then(function(res) { return res.json(); })
                .then(function(products) {
                    var grid = document.getElementById('products');
                    if (!products || products.length === 0) {
                        grid.innerHTML = '<div class="empty">No products available yet.</div>';
                        return;
                    }
                    grid.innerHTML = '';
                    products.forEach(function(product) {
                        var card = document.createElement('div');
                        card.className = 'product-card';
                        card.innerHTML =
                            '<div class="product-name">' + product.name + '</div>' +
                            '<div class="product-price">$' + Number(product.price).toFixed(2) + '</div>' +
                            '<button class="add-to-cart" onclick="addToCart(' + JSON.stringify(product).replace(/"/g, '&quot;') + ')">Add to Cart</button>';
                        grid.appendChild(card);
                    });
                })
                .catch(function(err) {
                    document.getElementById('products').innerHTML = '<div class="empty">Failed to load products.</div>';
                });
        });
        
        function addToCart(product) {
            // Create cart if it doesn't exist
            if (!cartId) {
                fetch('/api/cart', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                .then(response => response.json())
                .then(data => {
                    cartId = data.cartId;
                    localStorage.setItem('cartId', cartId);
                    addItemToCart(product);
                    updateCartDisplay();
                })
                .catch(err => {
                    console.error('Error creating cart:', err);
                });
            } else {
                addItemToCart(product);
                updateCartDisplay();
            }
        }
        
        function addItemToCart(product) {
            fetch(`/api/cart/${cartId}/items`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    productId: product.id,
                    productName: product.name,
                    price: product.price,
                    quantity: 1
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to add item to cart');
                }
                return response.json();
            })
            .catch(err => {
                console.error('Error adding to cart:', err);
            });
        }
    </script>
</body>
</html>
