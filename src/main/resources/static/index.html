<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart - Fresh Groceries Delivered</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333; background: #f8f9fa; }
        header { background: linear-gradient(135deg, #2d8a4e, #1a6b3a); color: white; padding: 2.5rem 1rem; text-align: center; position: relative; }
        header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        header p { font-size: 1.15rem; opacity: 0.9; font-weight: 300; }
        .cart-icon { position: absolute; top: 1rem; right: 1rem; background: #ff6b6b; color: white; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .cart-count { position: absolute; top: -8px; right: -8px; background: #ff6b6b; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .product-card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
        .product-name { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .product-price { font-size: 1.4rem; color: #2d8a4e; font-weight: 700; margin-bottom: 1rem; }
        .add-to-cart { background: #2d8a4e; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; transition: background 0.2s; }
        .add-to-cart:hover { background: #1a6b3a; }
        .loading { text-align: center; padding: 3rem; font-size: 1.1rem; color: #666; }
        .empty { text-align: center; padding: 3rem; color: #999; }
        footer { text-align: center; padding: 2rem 1rem; color: #888; font-size: 0.9rem; border-top: 1px solid #e9ecef; margin-top: 2rem; }
        
        /* Cart Sidebar Styles */
        .cart-sidebar { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.1); z-index: 1000; transition: right 0.3s ease; padding: 1.5rem; overflow-y: auto; }
        .cart-sidebar.open { right: 0; }
        .close-cart { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .cart-items { margin-bottom: 1.5rem; }
        .cart-item { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid #eee; }
        .cart-total { border-top: 2px solid #eee; padding-top: 1rem; margin-top: 1rem; font-size: 1.2rem; font-weight: bold; }
        .checkout-btn { background: #2d8a4e; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 1rem; }
        .checkout-btn:hover { background: #1a6b3a; }
        
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .product-grid { grid-template-columns: 1fr; }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>
    <header>
        <h1>FreshMart</h1>
        <p>Fresh groceries delivered to your door</p>
        <div class="cart-icon" onclick="toggleCart()">
            🛒
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </header>
    
    <div class="container">
        <div class="filter-bar" style="margin-bottom:1rem;">
            <select id="categoryFilter" onchange="loadProducts()" style="padding:0.5rem; font-size:1rem;">
                <option value="">All Categories</option>
                <option value="PRODUCE">Produce</option>
                <option value="DAIRY">Dairy</option>
                <option value="BAKERY">Bakery</option>
                <option value="MEAT">Meat</option>
                <option value="BEVERAGES">Beverages</option>
                <option value="SNACKS">Snacks</option>
                <option value="FROZEN">Frozen</option>
                <option value="HOUSEHOLD">Household</option>
            </select>
        </div>
        <div id="products" class="product-grid">
            <div class="loading">Loading products...</div>
        </div>
    </div>
    
    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <button class="close-cart" onclick="toggleCart()">&times;</button>
        <div class="cart-header">
            <h2>Your Cart</h2>
        </div>
        <div id="cartItems" class="cart-items">
            <!-- Cart items will be populated here -->
        </div>
        <div id="cartTotal" class="cart-total">
            Total: $0.00
        </div>
        <button class="checkout-btn" onclick="showCheckoutForm()">Checkout</button>
    <div id="checkoutForm" style="display:none; margin-top:1rem;">
        <h3>Checkout</h3>
        <input type="text" id="custName" placeholder="Name" style="width:100%;margin-bottom:0.5rem;" />
        <input type="email" id="custEmail" placeholder="Email" style="width:100%;margin-bottom:0.5rem;" />
        <textarea id="custAddress" placeholder="Address" style="width:100%;margin-bottom:0.5rem;"></textarea>
        <button onclick="submitCheckout()" style="background:#2d8a4e;color:white;border:none;padding:0.5rem 1rem;border-radius:4px;cursor:pointer;">Submit Order</button>
        <button onclick="hideCheckoutForm()" style="background:#aaa;color:white;border:none;padding:0.5rem 1rem;border-radius:4px;margin-left:0.5rem;cursor:pointer;">Cancel</button>
    </div>
    <div id="orderConfirmation" style="display:none; margin-top:1rem;">
        <h3>Order Confirmed</h3>
        <p id="orderInfo"></p>
        <button onclick="closeConfirmation()" style="background:#2d8a4e;color:white;border:none;padding:0.5rem 1rem;border-radius:4px;cursor:pointer;">Close</button>
    </div>
    </div>
    
    <footer>Powered by jclaw</footer>
    
    <script>
        let cartId = localStorage.getItem('cartId') || null;
        
        function toggleCart() {
            const sidebar = document.getElementById('cartSidebar');
            sidebar.classList.toggle('open');
        }
        
        function updateCartCount(count) {
            document.getElementById('cartCount').textContent = count;
        }
        
        function updateCartDisplay() {
            if (!cartId) return;
            
            fetch(`/api/cart/${cartId}`)
                .then(response => response.json())
                .then(items => {
                    const cartItemsContainer = document.getElementById('cartItems');
                    const cartTotalElement = document.getElementById('cartTotal');
                    
                    if (!items || items.length === 0) {
                        cartItemsContainer.innerHTML = '<p>Your cart is empty</p>';
                        cartTotalElement.textContent = 'Total: $0.00';
                        updateCartCount(0);
                        return;
                    }
                    
                    // Calculate total
                    let total = 0;
                    cartItemsContainer.innerHTML = items.map(item => {
                        const itemTotal = item.price * item.quantity;
                        total += itemTotal;
                        return `
                            <div class="cart-item">
                                <div>
                                    <div>${item.productName}</div>
                                    <div>Qty: ${item.quantity}</div>
                                </div>
                                <div>$${itemTotal.toFixed(2)}</div>
                            </div>
                        `;
                    }).join('');
                    
                    cartTotalElement.textContent = `Total: $${total.toFixed(2)}`;
                    updateCartCount(items.reduce((sum, item) => sum + item.quantity, 0));
                })
                .catch(err => {
                    console.error('Error loading cart:', err);
                });
        }
        
        function loadProducts() {
    const category = document.getElementById('categoryFilter').value;
    let url = '/api/products';
    if (category) {
        url = `/api/products/category/${category}`;
    }
    fetch(url)
        .then(res => res.json())
        .then(products => {
            const grid = document.getElementById('products');
            if (!products || products.length === 0) {
                grid.innerHTML = '<div class="empty">No products available yet.</div>';
                return;
            }
            grid.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                const badge = product.category ? `<span class="category-badge" style="background:#e0e0e0;padding:0.2rem 0.5rem;border-radius:4px;font-size:0.8rem;margin-right:0.5rem;">${product.category}</span>` : '';
                card.innerHTML =
                    `<div class="product-name">${badge}${product.name}</div>` +
                    `<div class="product-price">$${Number(product.price).toFixed(2)}</div>` +
                    `<div class="product-stock">In Stock: ${product.stockQuantity}</div>` +
                    `<button class="add-to-cart" ${product.stockQuantity <= 0 ? 'disabled' : ''} onclick='addToCart(${JSON.stringify(product).replace(/"/g, '\\"')} )'>Add to Cart</button>`;
                grid.appendChild(card);
            });
        })
        .catch(err => {
            document.getElementById('products').innerHTML = '<div class="empty">Failed to load products.</div>';
        });
}

document.addEventListener('DOMContentLoaded', loadProducts);

        function addToCart(product) {
            // Create cart if it doesn't exist
            if (!cartId) {
                fetch('/api/cart', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                .then(response => response.json())
                .then(data => {
                    cartId = data.cartId;
                    localStorage.setItem('cartId', cartId);
                    addItemToCart(product);
                    updateCartDisplay();
                })
                .catch(err => {
                    console.error('Error creating cart:', err);
                });
            } else {
                addItemToCart(product);
                updateCartDisplay();
            }
        }
        
        function addItemToCart(product) {
            fetch(`/api/cart/${cartId}/items`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    productId: product.id,
                    productName: product.name,
                    price: product.price,
                    quantity: 1
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to add item to cart');
                }
                return response.json();
            })
            .catch(err => {
                console.error('Error adding to cart:', err);
            });
        }
    function showCheckoutForm() {
        document.getElementById('checkoutForm').style.display = 'block';
    }
    function hideCheckoutForm() {
        document.getElementById('checkoutForm').style.display = 'none';
    }
    function closeConfirmation() {
        document.getElementById('orderConfirmation').style.display = 'none';
    }
    function submitCheckout() {
        const name = document.getElementById('custName').value;
        const email = document.getElementById('custEmail').value;
        const address = document.getElementById('custAddress').value;
        if (!cartId) {
            alert('Cart is empty');
            return;
        }
        const payload = {
            cartId: cartId,
            customerName: name,
            customerEmail: email,
            customerAddress: address
        };
        fetch('/api/orders/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(res => {
            if (!res.ok) throw new Error('Checkout failed');
            return res.json();
        })
        .then(resp => {
            // resp contains order and items
            const order = resp.order;
            const items = resp.items || [];
            let itemsHtml = items.map(i => `<li>${i.productName} x${i.quantity} - $${(i.price * i.quantity).toFixed(2)}</li>`).join('');
            document.getElementById('orderInfo').innerHTML = `Order ID: ${order.id}, Total: $${order.total}<br><ul>${itemsHtml}</ul>`;
            document.getElementById('orderConfirmation').style.display = 'block';
            // clear cart UI and local storage
            cartId = null;
            localStorage.removeItem('cartId');
            updateCartCount(0);
            document.getElementById('cartItems').innerHTML = '';
            document.getElementById('cartTotal').textContent = 'Total: $0.00';
            hideCheckoutForm();
            // reload products to reflect updated stock
            loadProducts();
        })
        .catch(err => {
            console.error(err);
            alert('Checkout error');
        });
    }
    </script>
</body>
</html>
